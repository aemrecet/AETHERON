        --color-surface-soft: #111111;

        --color-border-hover: #333333;
        --color-text-primary: #ffffff;
        --color-text-secondary: #888888;
        --color-text-tertiary: #555555;
        --color-accent: #2762bc;
        --color-accent-hover: #3578d8;
        --color-accent-subtle: rgba(39, 98, 188, 0.15);
        --color-accent-glow: rgba(39, 98, 188, 0.25);
        --color-positive: #00c076;
        --color-positive-bg: rgba(0, 192, 118, 0.1);
        --color-positive-text: #00c076;
        --color-negative: #ff3b3b;
        --color-negative-bg: rgba(255, 59, 59, 0.1);
        --color-negative-text: #ff3b3b;
        --color-warning: #f5a623;
        --color-warning-bg: rgba(245, 166, 35, 0.1);
        --shadow-xs: none;
        --shadow-sm: none;
        --shadow-md: none;
        --shadow-lg: none;
        --shadow-glow: none;
        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
        --radius-xl: 10px;
        --radius-2xl: 12px;
        --transition-fast: 80ms ease;
        --transition-normal: 150ms ease;
        --transition-smooth: 200ms ease;
        --transition-spring: 300ms ease;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body, #root { min-height: 100%; }

      body {
        margin: 0;
        overflow-x: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 13px;
        line-height: 1.5;
        letter-spacing: 0;
        color: var(--color-text-primary);
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--color-bg);
      }

      body::before, body::after { display: none; }

      ::selection { background: rgba(39, 98, 188, 0.4); color: #fff; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #222; border-radius: 0; }
      ::-webkit-scrollbar-thumb:hover { background: #333; }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fadeInScale {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .view-animate { animation: fadeIn 0.15s ease forwards; }

      .view-animate > * {
        animation: fadeInScale 0.2s ease forwards;
        animation-fill-mode: both;
      }

      .view-animate > *:nth-child(1) { animation-delay: 0s; }
      .view-animate > *:nth-child(2) { animation-delay: 0.03s; }
      .view-animate > *:nth-child(3) { animation-delay: 0.06s; }
      .view-animate > *:nth-child(4) { animation-delay: 0.09s; }
      .view-animate > *:nth-child(5) { animation-delay: 0.12s; }
      .view-animate > *:nth-child(6) { animation-delay: 0.15s; }
      .view-animate > *:nth-child(7) { animation-delay: 0.18s; }
      .view-animate > *:nth-child(8) { animation-delay: 0.21s; }

      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      .animate-marquee {
        display: flex;
        animation: marquee 60s linear infinite;
        will-change: transform;
      }
      .animate-marquee:hover { animation-play-state: paused; }

      @keyframes scrollNews {
        0% { transform: translateY(0); }
        100% { transform: translateY(-50%); }
      }
      .animate-news-scroll { animation: scrollNews 35s linear infinite; }
      .animate-news-scroll:hover { animation-play-state: paused; }

      .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
      .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

      .text-mono, .font-mono, .tabular-nums {
        font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;
        font-variant-numeric: tabular-nums;
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .skeleton {
        border-radius: 2px;
        background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
        background-size: 200% 100%;
        animation: shimmer 1.6s ease-in-out infinite;
      }

      @keyframes pulseSubtle { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .pulse-subtle { animation: pulseSubtle 2s ease-in-out infinite; }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .slide-up { animation: slideUp 0.15s ease forwards; }

      input::placeholder, textarea::placeholder { color: #444; }

      select, .input-field {
        background: #0d0d0d;
        border: 1px solid #1e1e1e;
        color: #fff;
        border-radius: 4px;
        transition: border-color 150ms ease;
      }
      select { padding: 7px 10px; font-size: 12px; }
      .input-field { padding: 9px 12px; font-size: 13px; }

      select:focus, .input-field:focus {
        outline: none;
        border-color: #2762bc;
      }

      .focus-ring:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px #2762bc;
      }

      .nav-item { transition: color 150ms ease; }
      .nav-item:hover { color: #fff !important; }

      .card {
        background: #0d0d0d;
        border: 1px solid #1e1e1e;
        border-radius: 8px;
      }

      .card-interactive {
        cursor: pointer;
        transition: background 150ms ease, border-color 150ms ease;
      }

      .card-interactive:hover {
        background: #111;
        border-color: #2a2a2a;
      }

      .card-interactive:active {
        background: #0a0a0a;
      }

      table { border-collapse: separate; border-spacing: 0; }

      .table-header { background: #0a0a0a; }

      .table-row { transition: background 80ms ease; }
      .table-row:hover { background: #0f0f0f; }

      .table-row-stripe:nth-child(even) { background: #080808; }
      .table-row-stripe:nth-child(even):hover { background: #0f0f0f; }

      .row-hover { transition: background 80ms ease; }
      .row-hover:hover { background: #0f0f0f; }

      .glass {
        background: #0a0a0a;
      }

      .glass-heavy {
        background: #080808;
      }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #888;
      }

      .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #111;
        border: 1px solid #1e1e1e;
        border-radius: 4px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 3px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: 0.01em;
        font-family: 'IBM Plex Mono', monospace;
      }

      .badge-positive { color: #00c076; background: rgba(0, 192, 118, 0.1); }
      .badge-negative { color: #ff3b3b; background: rgba(255, 59, 59, 0.1); }
      .badge-accent { color: #5a9aee; background: rgba(39, 98, 188, 0.15); }
      .badge-warning { color: #f5a623; background: rgba(245, 166, 35, 0.1); }

      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        transition: background 80ms ease;
        color: #555;
      }
      .icon-btn:hover { background: #1a1a1a; color: #888; }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: #2762bc;
        border: none;
        transition: background 150ms ease;
      }
      .btn-primary:hover { background: #3578d8; }
      .btn-primary:active { background: #1f53a0; }
      .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

      .tab-btn {
        position: relative;
        border: none;
        border-radius: 0;
        background: transparent;
        color: #555;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        padding: 8px 12px;
        white-space: nowrap;
        transition: color 150ms ease;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .tab-btn:hover { color: #aaa; }

      .tab-btn-active {
        color: #fff;
        border-bottom: 2px solid #fff;
      }
      .tab-btn-active::after { display: none; }

      .chip, .ask-chip, .trending-btn { transition: all 150ms ease; }
      .chip:hover, .ask-chip:hover, .trending-btn:hover {
        border-color: #333 !important;
        background: #111 !important;
        color: #fff !important;
      }

      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      textarea:focus { outline: none; }
      table td, table th { line-height: 1.4; }
