<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

    <title>Aethron</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23070b13'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='%23f0f7ff' font-family='Inter,system-ui,sans-serif' font-weight='700' font-size='12'%3EAE%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      :root {
        --color-bg: #060a12;
        --color-bg-secondary: #0b1322;
        --color-surface: rgba(10, 18, 32, 0.88);
        --color-surface-soft: rgba(14, 24, 42, 0.84);
        --color-surface-hover: rgba(22, 36, 60, 0.92);
        --color-surface-elevated: rgba(18, 30, 52, 0.96);
        --color-border: rgba(120, 160, 220, 0.15);
        --color-border-subtle: rgba(110, 148, 204, 0.09);
        --color-border-hover: rgba(140, 185, 245, 0.32);
        --color-text-primary: #eaf2ff;
        --color-text-secondary: #9cb4d4;
        --color-text-tertiary: #6b84a8;
        --color-accent: #3d8bfd;
        --color-accent-hover: #5ea3ff;
        --color-accent-subtle: rgba(61, 139, 253, 0.12);
        --color-accent-glow: rgba(61, 139, 253, 0.25);
        --color-positive: #22c990;
        --color-positive-bg: rgba(34, 201, 144, 0.12);
        --color-positive-text: #34e8a8;
        --color-negative: #f06570;
        --color-negative-bg: rgba(240, 101, 112, 0.12);
        --color-negative-text: #ff8b93;
        --color-warning: #f5a623;
        --color-warning-bg: rgba(245, 166, 35, 0.12);
        --shadow-xs: 0 1px 3px rgba(0, 0, 0, 0.18);
        --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.22);
        --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.28);
        --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.36);
        --shadow-glow: 0 0 40px rgba(61, 139, 253, 0.08);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --radius-2xl: 24px;
        --transition-fast: 100ms ease;
        --transition-normal: 180ms ease;
        --transition-smooth: 280ms cubic-bezier(0.16, 1, 0.3, 1);
        --transition-spring: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body, #root { min-height: 100%; }

      body {
        margin: 0;
        overflow-x: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.55;
        letter-spacing: -0.006em;
        color: var(--color-text-primary);
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--color-bg);
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(90, 130, 190, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(90, 130, 190, 0.035) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 20%, transparent 70%);
        animation: ambientGridShift 30s ease-in-out infinite alternate;
      }

      body::after {
        content: '';
        position: fixed;
        inset: -15%;
        z-index: -3;
        pointer-events: none;
        background:
          radial-gradient(50% 35% at 80% 15%, rgba(61, 139, 253, 0.1), transparent 70%),
          radial-gradient(45% 30% at 18% 20%, rgba(34, 201, 144, 0.05), transparent 70%),
          radial-gradient(55% 40% at 50% 90%, rgba(61, 139, 253, 0.04), transparent 70%);
        animation: auroraFloat 36s ease-in-out infinite alternate;
      }

      @keyframes ambientGridShift {
        0% { transform: translate3d(0, 0, 0); opacity: 0.6; }
        50% { transform: translate3d(-1%, 1%, 0); opacity: 1; }
        100% { transform: translate3d(1%, -0.8%, 0); opacity: 0.7; }
      }

      @keyframes auroraFloat {
        0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.5; }
        50% { transform: translate3d(-1.5%, -1.5%, 0) scale(1.04); opacity: 0.8; }
        100% { transform: translate3d(1.5%, 1%, 0) scale(1); opacity: 0.55; }
      }

      ::selection { background: rgba(61, 139, 253, 0.3); color: #f7fbff; }

      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(120, 150, 200, 0.2); border-radius: 999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(140, 170, 220, 0.35); }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeInScale {
        from { opacity: 0; transform: translateY(8px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .view-animate { animation: fadeIn 0.3s var(--transition-smooth) forwards; }

      .view-animate > * {
        animation: fadeInScale 0.35s var(--transition-smooth) forwards;
        animation-fill-mode: both;
      }

      .view-animate > *:nth-child(1) { animation-delay: 0s; }
      .view-animate > *:nth-child(2) { animation-delay: 0.04s; }
      .view-animate > *:nth-child(3) { animation-delay: 0.08s; }
      .view-animate > *:nth-child(4) { animation-delay: 0.12s; }
      .view-animate > *:nth-child(5) { animation-delay: 0.16s; }
      .view-animate > *:nth-child(6) { animation-delay: 0.2s; }
      .view-animate > *:nth-child(7) { animation-delay: 0.24s; }
      .view-animate > *:nth-child(8) { animation-delay: 0.28s; }

      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      .animate-marquee {
        display: flex;
        animation: marquee 60s linear infinite;
        will-change: transform;
      }
      .animate-marquee:hover { animation-play-state: paused; }

      @keyframes scrollNews {
        0% { transform: translateY(0); }
        100% { transform: translateY(-50%); }
      }
      .animate-news-scroll { animation: scrollNews 35s linear infinite; }
      .animate-news-scroll:hover { animation-play-state: paused; }

      .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
      .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

      .text-mono, .font-mono, .tabular-nums {
        font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;
        font-variant-numeric: tabular-nums;
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .skeleton {
        border-radius: var(--radius-md);
        background: linear-gradient(90deg, rgba(40, 60, 90, 0.3) 25%, rgba(60, 90, 130, 0.4) 50%, rgba(40, 60, 90, 0.3) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.6s ease-in-out infinite;
      }

      @keyframes pulseSubtle { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .pulse-subtle { animation: pulseSubtle 2s ease-in-out infinite; }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .slide-up { animation: slideUp 0.2s ease forwards; }

      input::placeholder, textarea::placeholder { color: var(--color-text-tertiary); opacity: 0.7; }

      select, .input-field {
        background: rgba(12, 22, 38, 0.8);
        border: 1px solid var(--color-border);
        color: var(--color-text-primary);
        border-radius: var(--radius-md);
        transition: border-color var(--transition-normal), box-shadow var(--transition-normal), background var(--transition-normal);
      }
      select { padding: 8px 12px; font-size: 12px; }
      .input-field { padding: 10px 14px; font-size: 13px; }

      select:focus, .input-field:focus {
        outline: none;
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px var(--color-accent-subtle), var(--shadow-sm);
        background: rgba(14, 24, 42, 0.9);
      }

      .focus-ring:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--color-accent), 0 0 0 4px rgba(61, 139, 253, 0.15);
      }

      .nav-item { transition: all var(--transition-normal); }
      .nav-item:hover { color: var(--color-text-primary) !important; }

      .card {
        background: rgba(10, 18, 32, 0.72);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        backdrop-filter: blur(12px) saturate(120%);
        -webkit-backdrop-filter: blur(12px) saturate(120%);
        transition: border-color var(--transition-normal), box-shadow var(--transition-normal);
      }

      .card-interactive {
        cursor: pointer;
        transition: transform var(--transition-smooth), border-color var(--transition-normal), box-shadow var(--transition-smooth), background var(--transition-normal);
      }

      .card-interactive:hover {
        transform: translateY(-2px);
        border-color: var(--color-border-hover);
        box-shadow: var(--shadow-md), var(--shadow-glow);
        background: rgba(14, 24, 42, 0.85);
      }

      .card-interactive:active {
        transform: translateY(0);
        transition-duration: 80ms;
      }

      table { border-collapse: separate; border-spacing: 0; }

      .table-header { background: rgba(14, 24, 42, 0.5); }

      .table-row { transition: background var(--transition-fast); }
      .table-row:hover { background: rgba(61, 139, 253, 0.05); }

      .table-row-stripe:nth-child(even) { background: rgba(61, 139, 253, 0.02); }
      .table-row-stripe:nth-child(even):hover { background: rgba(61, 139, 253, 0.06); }

      .row-hover { transition: background var(--transition-fast); }
      .row-hover:hover { background: rgba(61, 139, 253, 0.05); }

      .glass {
        background: rgba(8, 14, 26, 0.78);
        backdrop-filter: blur(20px) saturate(130%);
        -webkit-backdrop-filter: blur(20px) saturate(130%);
      }

      .glass-heavy {
        background: rgba(8, 14, 26, 0.9);
        backdrop-filter: blur(24px) saturate(140%);
        -webkit-backdrop-filter: blur(24px) saturate(140%);
      }

      .section-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--color-text-tertiary);
      }

      .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: var(--color-surface-soft);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: 0.02em;
      }

      .badge-positive { color: var(--color-positive-text); background: var(--color-positive-bg); }
      .badge-negative { color: var(--color-negative-text); background: var(--color-negative-bg); }
      .badge-accent { color: var(--color-accent); background: var(--color-accent-subtle); }
      .badge-warning { color: var(--color-warning); background: var(--color-warning-bg); }

      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        color: var(--color-text-tertiary);
      }
      .icon-btn:hover { background: rgba(61, 139, 253, 0.08); color: var(--color-text-secondary); }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 9px 18px;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #3d8bfd 0%, #2b7af0 100%);
        border: 1px solid rgba(100, 170, 255, 0.4);
        box-shadow: 0 4px 16px rgba(42, 110, 224, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transition: transform var(--transition-fast), box-shadow var(--transition-fast), filter var(--transition-fast);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        filter: brightness(1.08);
        box-shadow: 0 6px 20px rgba(42, 110, 224, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }
      .btn-primary:active { transform: translateY(0); filter: brightness(0.95); }
      .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }

      .tab-btn {
        position: relative;
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--color-text-tertiary);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        padding: 7px 14px;
        white-space: nowrap;
        transition: all var(--transition-normal);
      }
      .tab-btn:hover { color: var(--color-text-secondary); background: rgba(61, 139, 253, 0.05); }

      .tab-btn-active {
        color: var(--color-text-primary);
        background: rgba(61, 139, 253, 0.1);
        border-color: rgba(61, 139, 253, 0.22);
        box-shadow: inset 0 0 0 1px rgba(61, 139, 253, 0.06);
      }
      .tab-btn-active::after { display: none; }

      .chip, .ask-chip, .trending-btn { transition: all var(--transition-normal); }
      .chip:hover, .ask-chip:hover, .trending-btn:hover {
        border-color: rgba(61, 139, 253, 0.25) !important;
        background: rgba(61, 139, 253, 0.07) !important;
        color: var(--color-text-primary) !important;
        transform: translateY(-1px);
      }

      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      textarea:focus { outline: none; }
      table td, table th { line-height: 1.4; }

      .text-\[9px\] { font-size: 10px !important; }
      .text-\[10px\] { font-size: 11px !important; }
      .text-\[11px\] { font-size: 12px !important; }
      .text-\[12px\] { font-size: 13px !important; }

      .text-\[\#555962\] { color: var(--color-text-tertiary) !important; }
      .text-\[\#868c98\] { color: var(--color-text-secondary) !important; }
      .text-\[\#4c8bf5\] { color: var(--color-accent) !important; }

      .text-\[\#9da5b0\] { color: #adc0d8 !important; }
      .text-\[\#edf4ff\] { color: #f0f6ff !important; }
      .text-\[\#88a8cf\] { color: var(--color-accent) !important; }

      .bg-\[\#1c1d24\] { background-color: rgba(14, 24, 42, 0.6) !important; }
      .bg-\[\#22232b\] { background-color: rgba(20, 35, 58, 0.7) !important; }
      .bg-\[\#1a2540\] { background-color: rgba(30, 55, 90, 0.4) !important; }
      .bg-\[\#0f2d1f\] { background-color: rgba(20, 70, 55, 0.3) !important; }
      .bg-\[\#2d1520\] { background-color: rgba(100, 35, 50, 0.25) !important; }
      .bg-\[\#2d2810\] { background-color: rgba(100, 85, 30, 0.25) !important; }
      .bg-\[\#16171c\] { background-color: rgba(14, 24, 42, 0.6) !important; }
      .bg-\[\#2a2b33\] { background-color: rgba(30, 40, 60, 0.4) !important; }

      .border-\[\#ffffff0f\],
      .border-\[\#ffffff08\],
      .border-\[\#ffffff06\],
      .border-\[\#ffffff10\],
      .border-\[\#ffffff1d\] {
        border-color: var(--color-border-subtle) !important;
      }

      .hover\:bg-\[\#1c1d24\]:hover { background-color: rgba(61, 139, 253, 0.06) !important; }
      .hover\:text-\[\#6da0f7\]:hover { color: var(--color-accent-hover) !important; }

      .border-\[\#cde5ff1f\] { border-color: var(--color-border) !important; }
      .bg-\[\#ffffff0d\] { background-color: rgba(14, 24, 42, 0.4) !important; }
      .bg-\[\#ffffff12\] { background-color: rgba(14, 24, 42, 0.5) !important; }
      .bg-\[\#ffffff08\] { background-color: rgba(14, 24, 42, 0.3) !important; }
      .border-\[\#c9e2ff2f\] { border-color: var(--color-border) !important; }
      .bg-\[\#ffffff1b\] { background-color: rgba(61, 139, 253, 0.08) !important; }

      .hover\:bg-\[\#ffffff1b\]:hover { background-color: rgba(61, 139, 253, 0.1) !important; }

      @media (max-width: 768px) {
        body::after {
          background:
            radial-gradient(60% 40% at 70% 12%, rgba(61, 139, 253, 0.08), transparent 70%),
            radial-gradient(50% 35% at 20% 18%, rgba(34, 201, 144, 0.04), transparent 70%);
        }
        .text-\[9px\] { font-size: 9.5px !important; }
        .text-\[10px\] { font-size: 10.5px !important; }
      }
    </style>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'system-ui', 'sans-serif'],

            },
          },
        },
      };
    </script>

    <div id="root"></div>
